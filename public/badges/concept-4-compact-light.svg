<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44" role="img" aria-labelledby="badge-title4">
  <title id="badge-title4">GospelChannel Verified</title>

  <!-- Compact pill -->
  <rect x="0" y="0" width="200" height="44" rx="22" fill="#fdf8f4" stroke="#e8d5cc" stroke-width="1.2"/>

  <!-- Left accent -->
