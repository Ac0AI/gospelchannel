name: Bug report
description: Report something that is broken or behaving unexpectedly
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug in plain language.
      placeholder: The church page fails to load after clicking...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the page to render the video grid.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A short numbered list is enough.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, or local setup details
      placeholder: macOS 15, Chrome 134, local dev server
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Paste anything helpful here.
  - type: dropdown
    id: pr
    attributes:
      label: Interested in opening a PR?
      options:
        - No
        - Maybe
        - Yes
