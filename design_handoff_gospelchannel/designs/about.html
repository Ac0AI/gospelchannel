<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>About — GospelChannel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/shared.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="lib/shared.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const App = () => (
  <div className="gc-page">
    <GCHeader active="About" />

    {/* Manifesto hero */}
    <section style={{ padding: "120px 48px 80px", maxWidth: 920, margin: "0 auto", textAlign: "center" }}>
      <p className="gc-eyebrow">A short manifesto</p>
      <h1 className="gc-h1" style={{ fontSize: 96, marginTop: 18, lineHeight: 1.02 }}>
        People find God <em className="gc-italic">differently</em>.
      </h1>
      <p style={{ fontFamily: "var(--font-serif)", fontSize: 28, fontStyle: "italic", color: "var(--warm-brown)", lineHeight: 1.45, marginTop: 32, fontWeight: 500 }}>
        Some through hymns. Some through Hillsong. Some through silence in a stone cathedral. Some through a guitar in a school gym. We believe every one of those rooms deserves a beautiful door.
      </p>
    </section>

    {/* Story — long-form editorial */}
    <section style={{ maxWidth: 720, margin: "0 auto", padding: "0 48px" }}>
      <div style={{ fontFamily: "var(--font-serif)", fontSize: 19, lineHeight: 1.7, color: "var(--espresso)" }}>
        <p style={{ marginTop: 0 }}>
          <span style={{ float: "left", fontFamily: "var(--font-serif)", fontSize: 96, fontWeight: 600, color: "var(--rose-gold)", lineHeight: 0.85, marginRight: 14, marginTop: 8, fontStyle: "italic" }}>G</span>
          ospelChannel started because two of us moved to a new city and couldn't find a church we'd want to walk into. Not because there weren't any — there were dozens — but because every one of their websites looked like it was designed by someone who didn't believe people would actually visit.
        </p>
        <p>The information we needed — what time, what kind of music, will I be the only person under 60, do they have anything for kids — was buried. Or missing. Or last updated in 2014.</p>
        <p>We're not pastors. We're designers and engineers who love the church. And we kept asking: <em style={{ color: "var(--rose-gold-deep)" }}>why does the place that's supposed to welcome strangers have the worst onboarding on the internet?</em></p>
        <p>So we built one page. Then five. Then we asked thirty pastors if we could rebuild theirs. They said yes. Then they said please. Then they sent it to other pastors.</p>
        <p>This is a directory of churches, made by people who think the front door matters. It's free because we think charging churches to be findable is wrong. It's ad-free because we think putting a Coca-Cola banner next to a prayer is also wrong.</p>
        <p>We're small. We're independent. We're <em style={{ color: "var(--rose-gold-deep)" }}>4,287 churches in</em>. Most days we still can't believe it.</p>
      </div>
    </section>

    {/* Numbers */}
    <section style={{ maxWidth: 1280, margin: "100px auto 0", padding: "0 48px" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 0, borderTop: "var(--border)", borderBottom: "var(--border)" }}>
        {[
          { n: "4,287", l: "Churches listed" },
          { n: "67", l: "Countries" },
          { n: "12,847", l: "Prayers this week" },
          { n: "2.1M", l: "Visitors found a church in 2024" },
        ].map((s, i) => (
          <div key={s.n} style={{ padding: "48px 32px", textAlign: "center", borderRight: i < 3 ? "var(--border)" : "none" }}>
            <p style={{ fontFamily: "var(--font-serif)", fontSize: 64, fontWeight: 600, color: "var(--espresso)", margin: 0, letterSpacing: "-0.02em" }}>{s.n}</p>
            <p style={{ fontSize: 12, color: "var(--muted-warm)", letterSpacing: "0.16em", textTransform: "uppercase", margin: "8px 0 0" }}>{s.l}</p>
          </div>
        ))}
      </div>
    </section>

    {/* Principles */}
    <section style={{ maxWidth: 1280, margin: "100px auto 0", padding: "0 48px" }}>
      <p className="gc-eyebrow" style={{ textAlign: "center" }}>What we believe</p>
      <h2 className="gc-h2" style={{ textAlign: "center", marginTop: 12, marginBottom: 56, fontSize: 56 }}>Five things we won't compromise.</h2>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 20 }}>
        {[
          { n: "I.", t: "Free, always.", b: "Charging churches to be found is wrong. We'd rather grow slowly." },
          { n: "II.", t: "No ads.", b: "Not now, not ever. Not even tasteful ones. Not even from publishers." },
          { n: "III.", t: "No data sold.", b: "We don't track visitors, we don't share emails, we don't have a CRM to leak. Less data is more peace." },
          { n: "IV.", t: "Every tradition welcome.", b: "Catholic and Pentecostal. Lutheran and non-denominational. We don't editorialize on theology." },
          { n: "V.", t: "Beauty is part of the mission.", b: "A page can be a sermon. We design like every visitor is making up their mind in 90 seconds — because they are." },
        ].map((p, i) => (
          <div key={p.n} style={{ background: i === 4 ? "var(--espresso)" : "white", color: i === 4 ? "var(--linen)" : "var(--espresso)", borderRadius: 22, padding: "32px 36px", border: i !== 4 ? "var(--border-soft)" : "none", gridColumn: i === 4 ? "1 / -1" : undefined, display: "flex", gap: 24, alignItems: "flex-start" }}>
            <p style={{ fontFamily: "var(--font-serif)", fontSize: 44, fontWeight: 500, fontStyle: "italic", color: i === 4 ? "var(--blush)" : "var(--rose-gold)", margin: 0, lineHeight: 1, minWidth: 60 }}>{p.n}</p>
            <div>
              <h3 style={{ fontFamily: "var(--font-serif)", fontSize: 28, fontWeight: 600, margin: 0, letterSpacing: "-0.01em" }}>{p.t}</h3>
              <p style={{ fontSize: 15, opacity: 0.78, lineHeight: 1.55, marginTop: 8 }}>{p.b}</p>
            </div>
          </div>
        ))}
      </div>
    </section>

    {/* CTA */}
    <section style={{ maxWidth: 920, margin: "100px auto 0", padding: "0 48px", textAlign: "center" }}>
      <h2 className="gc-h2" style={{ fontSize: 56 }}>Get in touch.</h2>
      <p className="gc-lede" style={{ marginTop: 18, maxWidth: 520, marginInline: "auto" }}>
        We read every email. Press, partnerships, pastors with questions, theologians with concerns — all welcome.
      </p>
      <p style={{ fontFamily: "var(--font-serif)", fontSize: 32, fontWeight: 500, color: "var(--rose-gold)", marginTop: 32, fontStyle: "italic" }}>hello@gospelchannel.org</p>
    </section>

    <GCFooter />
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
